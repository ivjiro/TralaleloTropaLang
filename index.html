<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dataset Viewer — Bangladesh Student Performance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f3;
      --color-bg-tertiary: #eeede9;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-border: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.25);
      --color-info-bg: #e6f1fb;
      --color-info-text: #185fa5;
      --color-info-border: #378add;
      --color-success-bg: #eaf3de;
      --color-success-text: #3b6d11;
      --color-danger-bg: #fcebeb;
      --color-danger-text: #a32d2d;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #252523;
        --color-bg-tertiary: #2e2e2b;
        --color-text-primary: #e8e6de;
        --color-text-secondary: #a09e96;
        --color-text-tertiary: #6e6c65;
        --color-border: rgba(255,255,255,0.12);
        --color-border-secondary: rgba(255,255,255,0.25);
        --color-info-bg: #042c53;
        --color-info-text: #85b7eb;
        --color-info-border: #185fa5;
        --color-success-bg: #173404;
        --color-success-text: #97c459;
        --color-danger-bg: #501313;
        --color-danger-text: #f09595;
      }
    }

    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text-primary);
      padding: 2rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: var(--color-text-primary);
    }

    /* Upload zone */
    .upload-zone {
      border: 1px dashed var(--color-border-secondary);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 14px;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-zone:hover { background: var(--color-bg-secondary); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone label {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .upload-zone svg {
      width: 32px;
      height: 32px;
      color: var(--color-text-tertiary);
    }
    .upload-zone strong { color: var(--color-text-primary); font-weight: 500; }
    .upload-zone small { font-size: 12px; color: var(--color-text-tertiary); }

    /* Stat bar */
    .stat-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    .stat strong {
      color: var(--color-text-primary);
      font-weight: 500;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--color-text-secondary);
      pointer-events: none;
    }
    input[type="text"],
    select {
      font-family: var(--font);
      font-size: 14px;
      padding: 7px 10px;
      background: var(--color-bg);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    select:focus { border-color: var(--color-info-border); }
    .search-wrap input[type="text"] { width: 100%; padding-left: 32px; }
    select { font-size: 13px; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 500px;
    }
    thead { background: var(--color-bg-secondary); }
    th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
      color: var(--color-text-secondary);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-bottom: 1px solid var(--color-border);
    }
    th:hover { color: var(--color-text-primary); background: var(--color-bg-tertiary); }
    th .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; font-style: normal; }
    th.asc .sort-icon,
    th.desc .sort-icon { opacity: 1; color: var(--color-info-text); }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-text-primary);
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--color-bg-secondary); }
    .numeric { text-align: right; font-variant-numeric: tabular-nums; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-pass { background: var(--color-success-bg); color: var(--color-success-text); }
    .badge-fail { background: var(--color-danger-bg); color: var(--color-danger-text); }

    /* Empty state */
    .empty {
      padding: 3rem;
      text-align: center;
      color: var(--color-text-tertiary);
      font-size: 14px;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
      font-size: 13px;
      color: var(--color-text-secondary);
      flex-wrap: wrap;
    }
    .page-btns { display: flex; gap: 4px; margin-left: auto; }
    .page-btn {
      padding: 5px 10px;
      font-size: 12px;
      font-family: var(--font);
      border-radius: var(--radius-md);
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--color-border-secondary);
      color: var(--color-text-primary);
      transition: background 0.1s;
    }
    .page-btn:hover { background: var(--color-bg-secondary); }
    .page-btn.active {
      background: var(--color-info-bg);
      color: var(--color-info-text);
      border-color: var(--color-info-border);
    }
    .page-btn:disabled { opacity: 0.3; cursor: default; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>

<h1>Dataset Viewer</h1>

<!-- Upload Zone -->
<div class="upload-zone" id="dropZone">
  <input type="file" id="fileInput" accept=".csv">
  <label for="fileInput">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 3v13M8 7l4-4 4 4"/>
    </svg>
    <span>Upload <strong>bangladesh_student_performance.csv</strong> or any CSV</span>
    <small>Click to browse or drag and drop</small>
  </label>
</div>

</body>
</html>
